function serviceStatus(nextDate) {
  if (!nextDate) return "unknown";
  const today = new Date(); today.setHours(0,0,0,0);
  const next = new Date(nextDate); next.setHours(0,0,0,0);
  const diff = Math.ceil((next - today) / (1000*60*60*24));
  if (diff < 0) return "overdue";
  if (diff <= 14) return "due-soon";
  return "ok";
}

function statusLabel(nextDate) {
  if (!nextDate) return "No date set";
  const today = new Date(); today.setHours(0,0,0,0);
  const next = new Date(nextDate); next.setHours(0,0,0,0);
  const diff = Math.ceil((next - today) / (1000*60*60*24));
  if (diff < 0) return `Overdue by ${Math.abs(diff)} day${Math.abs(diff)!==1?"s":""}`;
  if (diff === 0) return "Due today!";
  if (diff <= 14) return `Due in ${diff} day${diff!==1?"s":""}`;
  return `Due ${next.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}`;
}

function fmtDate(d) {
  if (!d) return "—";
  return new Date(d).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
}
