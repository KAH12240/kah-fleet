<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>KAH Fleet Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Nunito', sans-serif; background: #0f1923; color: #e8e8e0; min-height: 100vh; }
button, input, select, textarea { font-family: 'Nunito', sans-serif; }
::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #1a2633; } ::-webkit-scrollbar-thumb { background: #f5a623; border-radius: 3px; }
@keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
@keyframes wrenchPulse { 0%,100% { transform: rotate(0deg); } 25% { transform: rotate(-15deg); } 75% { transform: rotate(15deg); } }
.fade-in { animation: fadeIn 0.35s ease both; }
.bus-card:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(245,166,35,0.15) !important; }
.bus-card { transition: transform 0.2s ease, box-shadow 0.2s ease; }
.needs-service-card:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(231,76,60,0.2) !important; }
.needs-service-card { transition: transform 0.2s ease, box-shadow 0.2s ease; }
.status-dot { width:10px; height:10px; border-radius:50%; display:inline-block; margin-right:6px; }
.overdue { background:#e74c3c; box-shadow: 0 0 8px #e74c3c88; animation: pulse 2s infinite; }
.due-soon { background:#f5a623; box-shadow: 0 0 8px #f5a62388; }
.ok { background:#2ecc71; }
input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.7); cursor: pointer; }
.wrench-anim { animation: wrenchPulse 1.5s ease-in-out infinite; display: inline-block; }
.needs-service-btn { transition: all 0.2s ease; }
.needs-service-btn:hover { transform: scale(1.05); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;
const { createClient } = supabase;
const sb = createClient("https://tjvzvwbtmilknguywdse.supabase.co", "sb_publishable_6gAsF5-FGs3SiEx-V2WL6Q_nenqNO5q");

const CENTERS = [
  "KAH @ Barnsley Elementary","KAH @ Bayard Rustin Elementary","KAH @ Burtonsville Elementary",
  "KAH @ Cannon Road Elementary","KAH @ Carderock Springs Elementary","KAH @ Cloverly Elementary",
  "KAH @ Fairland Elementary","KAH @ Farmland Elementary","KAH @ Flora Singer Elementary",
  "KAH @ Flower Valley Elementary","KAH @ Forest Knolls Elementary","KAH @ Freedom Elementary",
  "KAH @ Garrett Park Elementary","KAH @ Glenallan Elementary","KAH @ Glen Haven Elementary",
  "KAH @ Greencastle Elementary","KAH @ Highland View Elementary","KAH @ Meadow Hall Elementary",
  "KAH @ North Chevy Chase Elementary","KAH @ Oakland Terrace Elementary","KAH @ Page Elementary",
  "KAH @ Red Barn Ranch","KAH @ Rock View Elementary","KAH @ Rosemary Hills Elementary",
  "KAH @ Sargent Shriver Elementary","KAH @ Taneytown Elementary","KAH @ Westbrook Elementary",
  "KAH @ Westover Elementary","KAH @ Woodlin Elementary","Main Office / Garage","In Transit","Butler's Auto Service","Other"
];

const BUS_NAMES = [
  "Bus 21","Bus 22","Bus 23","Bus 24","Bus 25","Bus 26","Bus 27",
  "Shuttle 1","Shuttle 2","Red Van","Blue Van","Yellow Van","Green Van"
];

function serviceStatus(nextDate) {
  if (!nextDate) return "unknown";
  const today = new Date(); today.setHours(0,0,0,0);
  const next = new Date(nextDate); next.setHours(0,0,0,0);
  const diff = Math.ceil((next - today) / (1000*60*60*24));
  if (diff < 0) return "overdue";
  if (diff <= 14) return "due-soon";
  return "ok";
}

function statusLabel(nextDate) {
  if (!nextDate) return "No date set";
  const today = new Date(); today.setHours(0,0,0,0);
  const next = new Date(nextDate); next.setHours(0,0,0,0);
  const diff = Math.ceil((next - today) / (1000*60*60*24));
  if (diff < 0) return `Overdue by ${Math.abs(diff)} day${Math.abs(diff)!==1?"s":""}`;
  if (diff === 0) return "Due today!";
  if (diff <= 14) return `Due in ${diff} day${diff!==1?"s":""}`;
  return `Due ${next.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}`;
}

function fmtDate(d) {
  if (!d) return "—";
  return new Date(d).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
}

const EMPTY_FORM = { bus_name:"", location:"", driver:"", last_service:"", next_service:"", mileage:"", notes:"" };

function App() {
  const [buses, setBuses] = useState([]);
  const [loading, setLoading] = useState(true);
  const [modal, setModal] = useState(null);
  const [form, setForm] = useState(EMPTY_FORM);
  const [saving, setSaving] = useState(false);
  const [toast, setToast] = useState(null);
  const [search, setSearch] = useState("");
  const [confirmDelete, setConfirmDelete] = useState(null);
  const [togglingId, setTogglingId] = useState(null);

  const showToast = (msg, type="success") => { setToast({msg,type}); setTimeout(()=>setToast(null),3500); };

  useEffect(() => { loadBuses(); }, []);

  async function loadBuses() {
    setLoading(true);
    try {
      const { data, error } = await sb.from("buses").select("*").order("bus_name");
      if (error) throw error;
      setBuses(data || []);
    } catch(e) { showToast("Could not load buses: " + e.message, "error"); }
    setLoading(false);
  }

  function openAdd() { setForm({...EMPTY_FORM, bus_name: getNextBusName()}); setModal({mode:"add"}); }

  function openEdit(bus) {
    setForm({ bus_name:bus.bus_name||"", location:bus.location||"", driver:bus.driver||"", last_service:bus.last_service||"", next_service:bus.next_service||"", mileage:bus.mileage||"", notes:bus.notes||"" });
    setModal({mode:"edit", bus});
  }

  function openView(bus) { setModal({mode:"view", bus}); }

  function getNextBusName() {
    const used = buses.map(b=>b.bus_name);
    return BUS_NAMES.find(n=>!used.includes(n)) || "";
  }

  async function toggleNeedsService(e, bus) {
    e.stopPropagation();
    setTogglingId(bus.id);
    try {
      const newVal = !bus.needs_service;
      const { error } = await sb.from("buses").update({ needs_service: newVal, updated_at: new Date().toISOString() }).eq("id", bus.id);
      if (error) throw error;
      setBuses(prev => prev.map(b => b.id === bus.id ? {...b, needs_service: newVal} : b));
      showToast(newVal ? `${bus.bus_name} flagged for service!` : `${bus.bus_name} cleared.`, newVal ? "warning" : "success");
    } catch(e) { showToast("Update failed: " + e.message, "error"); }
    setTogglingId(null);
  }

  async function handleSave() {
    if (!form.bus_name) { showToast("Please select a bus name.", "error"); return; }
    setSaving(true);
    try {
      const payload = { bus_name:form.bus_name, location:form.location||null, driver:form.driver||null, last_service:form.last_service||null, next_service:form.next_service||null, mileage:form.mileage?parseInt(form.mileage):null, notes:form.notes||null, updated_at:new Date().toISOString() };
      if (modal.mode === "add") {
        const { error } = await sb.from("buses").insert([{...payload, id:`bus_${Date.now()}`}]);
        if (error) throw error;
        showToast("Bus added successfully!");
      } else {
        const { error } = await sb.from("buses").update(payload).eq("id", modal.bus.id);
        if (error) throw error;
        showToast("Bus updated!");
      }
      await loadBuses(); setModal(null);
    } catch(e) { showToast("Save failed: " + e.message, "error"); }
    setSaving(false);
  }

  async function handleDelete(id) {
    try {
      const { error } = await sb.from("buses").delete().eq("id", id);
      if (error) throw error;
      await loadBuses(); setConfirmDelete(null); setModal(null); showToast("Bus removed.");
    } catch(e) { showToast("Delete failed: " + e.message, "error"); }
  }

  const filtered = buses.filter(b =>
    b.bus_name?.toLowerCase().includes(search.toLowerCase()) ||
    b.driver?.toLowerCase().includes(search.toLowerCase()) ||
    b.location?.toLowerCase().includes(search.toLowerCase())
  );

  const needsServiceBuses = buses.filter(b => b.needs_service);
  const overdueCount = buses.filter(b => serviceStatus(b.next_service) === "overdue").length;
  const dueSoonCount = buses.filter(b => serviceStatus(b.next_service) === "due-soon").length;

  const S = {
    header: { background:"linear-gradient(135deg,#1a2633 0%,#0f1923 100%)", borderBottom:"2px solid #f5a623", padding:"20px 32px", display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:16 },
    title: { fontFamily:"'Bebas Neue',sans-serif", fontSize:36, letterSpacing:3, color:"#f5a623", lineHeight:1 },
    subtitle: { fontSize:12, color:"#8a9ab0", letterSpacing:1, marginTop:2 },
    addBtn: { background:"#f5a623", color:"#0f1923", border:"none", borderRadius:10, padding:"10px 22px", fontSize:14, fontWeight:800, cursor:"pointer", letterSpacing:0.5 },
    statsRow: { display:"flex", gap:14, padding:"20px 32px 0", flexWrap:"wrap" },
    statCard: { background:"#1a2633", borderRadius:12, padding:"14px 20px", flex:1, minWidth:120, border:"1px solid #2a3a4a" },
    statNum: { fontFamily:"'Bebas Neue',sans-serif", fontSize:32, lineHeight:1 },
    statLbl: { fontSize:11, color:"#8a9ab0", letterSpacing:1, marginTop:2 },
    searchRow: { padding:"20px 32px", display:"flex", gap:12, alignItems:"center" },
    searchInput: { flex:1, background:"#1a2633", border:"1px solid #2a3a4a", borderRadius:10, padding:"10px 16px", color:"#e8e8e0", fontSize:14, outline:"none" },
    grid: { display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))", gap:18, padding:"0 32px 32px" },
    card: { background:"#1a2633", borderRadius:16, padding:22, border:"1px solid #2a3a4a", cursor:"pointer" },
    cardBusName: { fontFamily:"'Bebas Neue',sans-serif", fontSize:28, color:"#f5a623", letterSpacing:2, marginBottom:4 },
    cardRow: { display:"flex", alignItems:"center", gap:8, marginBottom:6, fontSize:13, color:"#c0c8d4" },
    cardIcon: { fontSize:15, width:20, textAlign:"center" },
    modalOverlay: { position:"fixed", inset:0, background:"rgba(0,0,0,0.75)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:1000, padding:20 },
    modalBox: { background:"#1a2633", borderRadius:20, padding:"32px", maxWidth:520, width:"100%", border:"1px solid #2a3a4a", maxHeight:"90vh", overflowY:"auto" },
    modalTitle: { fontFamily:"'Bebas Neue',sans-serif", fontSize:28, color:"#f5a623", letterSpacing:2, marginBottom:24 },
    label: { display:"block", fontSize:11, fontWeight:700, color:"#8a9ab0", letterSpacing:1, marginBottom:6, textTransform:"uppercase" },
    input: { width:"100%", background:"#0f1923", border:"1px solid #2a3a4a", borderRadius:10, padding:"10px 14px", color:"#e8e8e0", fontSize:14, outline:"none", marginBottom:16 },
    select: { width:"100%", background:"#0f1923", border:"1px solid #2a3a4a", borderRadius:10, padding:"10px 14px", color:"#e8e8e0", fontSize:14, outline:"none", marginBottom:16 },
    textarea: { width:"100%", background:"#0f1923", border:"1px solid #2a3a4a", borderRadius:10, padding:"10px 14px", color:"#e8e8e0", fontSize:14, outline:"none", marginBottom:16, resize:"vertical" },
    btnRow: { display:"flex", gap:10, marginTop:8 },
    saveBtn: { flex:1, background:"#f5a623", color:"#0f1923", border:"none", borderRadius:10, padding:"12px 0", fontSize:15, fontWeight:800, cursor:"pointer" },
    cancelBtn: { background:"transparent", color:"#8a9ab0", border:"1px solid #2a3a4a", borderRadius:10, padding:"12px 20px", fontSize:14, cursor:"pointer", fontWeight:600 },
    deleteBtn: { background:"transparent", color:"#e74c3c", border:"1px solid #e74c3c44", borderRadius:10, padding:"12px 16px", fontSize:13, cursor:"pointer", fontWeight:700 },
    editBtn: { flex:1, background:"#f5a623", color:"#0f1923", border:"none", borderRadius:10, padding:"12px 0", fontSize:15, fontWeight:800, cursor:"pointer" },
    viewRow: { display:"flex", gap:12, marginBottom:14, padding:"14px 16px", background:"#0f1923", borderRadius:10 },
    viewIcon: { fontSize:20 },
    viewLabel: { fontSize:11, color:"#8a9ab0", letterSpacing:1, textTransform:"uppercase", marginBottom:3 },
    viewValue: { fontSize:15, fontWeight:700, color:"#e8e8e0" },
    empty: { textAlign:"center", padding:"60px 20px", color:"#4a5a6a" },
    toast: { position:"fixed", bottom:24, right:24, padding:"13px 22px", borderRadius:10, fontWeight:700, fontSize:14, zIndex:9999, maxWidth:340, boxShadow:"0 4px 24px rgba(0,0,0,0.4)" },
    gridHalf: { display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 },
    nsSection: { margin:"20px 32px 0", background:"linear-gradient(135deg,#2a1010 0%,#1a1010 100%)", border:"2px solid #e74c3c66", borderRadius:16, overflow:"hidden" },
    nsHeader: { display:"flex", alignItems:"center", justifyContent:"space-between", padding:"16px 22px", borderBottom:"1px solid #e74c3c33", background:"rgba(231,76,60,0.08)" },
    nsTitle: { fontFamily:"'Bebas Neue',sans-serif", fontSize:26, color:"#e74c3c", letterSpacing:3, display:"flex", alignItems:"center", gap:10 },
    nsGrid: { display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))", gap:14, padding:18 },
    nsCard: { background:"#1a1010", border:"1px solid #e74c3c44", borderRadius:12, padding:18, cursor:"pointer", position:"relative" },
    nsCardName: { fontFamily:"'Bebas Neue',sans-serif", fontSize:24, color:"#ff6b6b", letterSpacing:2, marginBottom:6 },
    nsCardRow: { display:"flex", alignItems:"center", gap:8, fontSize:12, color:"#c0a0a0", marginBottom:4 },
  };

  function NeedsServiceBtn({ bus }) {
    const active = bus.needs_service;
    const toggling = togglingId === bus.id;
    return (
      <button className="needs-service-btn" onClick={(e)=>toggleNeedsService(e,bus)} disabled={toggling}
        style={{ marginTop:12, width:"100%", padding:"8px 0", borderRadius:9, border:active?"2px solid #e74c3c":"2px solid #e74c3c55", background:active?"rgba(231,76,60,0.18)":"transparent", color:active?"#ff6b6b":"#8a6a6a", fontSize:12, fontWeight:800, cursor:toggling?"wait":"pointer", letterSpacing:0.5, display:"flex", alignItems:"center", justifyContent:"center", gap:6, opacity:toggling?0.6:1 }}>
        <span style={active?{display:"inline-block",animation:"wrenchPulse 1.5s ease-in-out infinite"}:{}}>🔧</span>
        {toggling?"Updating…":active?"NEEDS SERVICE ✓":"NEEDS SERVICE"}
      </button>
    );
  }

  return (
    <div style={{minHeight:"100vh",background:"#0f1923"}}>

      <div style={S.header}>
        <div>
          <div style={S.title}>🚌 KAH Fleet Tracker</div>
          <div style={S.subtitle}>KIDS AFTER HOURS · BUS MANAGEMENT</div>
        </div>
        <div style={{display:"flex",gap:10,alignItems:"center"}}>
          <button style={S.addBtn} onClick={loadBuses}>🔄 Refresh</button>
          <button style={S.addBtn} onClick={openAdd}>+ Add Vehicle</button>
        </div>
      </div>

      <div style={S.statsRow}>
        <div style={S.statCard}><div style={{...S.statNum,color:"#f5a623"}}>{buses.length}</div><div style={S.statLbl}>TOTAL VEHICLES</div></div>
        <div style={{...S.statCard,borderColor:needsServiceBuses.length>0?"#e74c3c66":"#2a3a4a"}}><div style={{...S.statNum,color:needsServiceBuses.length>0?"#e74c3c":"#4a5a6a"}}>{needsServiceBuses.length}</div><div style={S.statLbl}>NEEDS SERVICE</div></div>
        <div style={{...S.statCard,borderColor:overdueCount>0?"#e74c3c44":"#2a3a4a"}}><div style={{...S.statNum,color:overdueCount>0?"#e74c3c":"#4a5a6a"}}>{overdueCount}</div><div style={S.statLbl}>OVERDUE SERVICE</div></div>
        <div style={{...S.statCard,borderColor:dueSoonCount>0?"#f5a62344":"#2a3a4a"}}><div style={{...S.statNum,color:dueSoonCount>0?"#f5a623":"#4a5a6a"}}>{dueSoonCount}</div><div style={S.statLbl}>DUE WITHIN 14 DAYS</div></div>
        <div style={S.statCard}><div style={{...S.statNum,color:"#2ecc71"}}>{buses.filter(b=>serviceStatus(b.next_service)==="ok").length}</div><div style={S.statLbl}>SERVICE OK</div></div>
      </div>

      <div style={S.nsSection}>
        <div style={S.nsHeader}>
          <div style={S.nsTitle}>
            <span className={needsServiceBuses.length>0?"wrench-anim":""}>🔧</span>
            NEEDS SERVICE
            {needsServiceBuses.length>0 && <span style={{background:"#e74c3c",color:"#fff",fontFamily:"'Bebas Neue',sans-serif",fontSize:18,borderRadius:20,padding:"2px 12px"}}>{needsServiceBuses.length}</span>}
          </div>
          {needsServiceBuses.length>0 && <span style={{fontSize:12,color:"#8a5a5a"}}>Click a vehicle to view · Click button to clear</span>}
        </div>
        {needsServiceBuses.length===0 ? (
          <div style={{padding:"20px 22px",color:"#4a3030",fontSize:13,fontStyle:"italic"}}>✅ No vehicles flagged for service right now.</div>
        ) : (
          <div style={S.nsGrid}>
            {needsServiceBuses.map((bus,i)=>(
              <div key={bus.id} className="needs-service-card fade-in" style={{...S.nsCard,animationDelay:`${i*0.05}s`}} onClick={()=>openView(bus)}>
                <div style={{position:"absolute",top:12,right:12,width:10,height:10,background:"#e74c3c",borderRadius:"50%",boxShadow:"0 0 8px #e74c3c",animation:"pulse 2s infinite"}} />
                <div style={S.nsCardName}>{bus.bus_name}</div>
                {bus.location && <div style={S.nsCardRow}><span>📍</span>{bus.location.replace("KAH @ ","")}</div>}
                {bus.driver && <div style={S.nsCardRow}><span>👤</span>{bus.driver}</div>}
                <button onClick={(e)=>toggleNeedsService(e,bus)} disabled={togglingId===bus.id}
                  style={{marginTop:12,width:"100%",padding:"7px 0",borderRadius:8,border:"1px solid #e74c3c66",background:"rgba(231,76,60,0.1)",color:"#e74c3c",fontSize:11,fontWeight:800,cursor:"pointer",letterSpacing:0.5}}>
                  {togglingId===bus.id?"Updating…":"✓ CLEAR FROM SERVICE LIST"}
                </button>
              </div>
            ))}
          </div>
        )}
      </div>

      <div style={S.searchRow}>
        <input style={S.searchInput} placeholder="🔍 Search by bus, driver, or location…" value={search} onChange={e=>setSearch(e.target.value)} />
      </div>

      {loading ? (
        <div style={S.empty}><span style={{fontSize:40}}>⏳</span><p style={{marginTop:12}}>Loading fleet data…</p></div>
      ) : filtered.length===0 ? (
        <div style={S.empty}><span style={{fontSize:48}}>🚌</span><p style={{marginTop:12,fontSize:16}}>{buses.length===0?"No vehicles added yet.":"No vehicles match your search."}</p></div>
      ) : (
        <div style={S.grid}>
          {filtered.map((bus,i)=>{
            const st = serviceStatus(bus.next_service);
            return (
              <div key={bus.id} className="bus-card fade-in" style={{...S.card,animationDelay:`${i*0.05}s`,border:bus.needs_service?"1px solid #e74c3c44":"1px solid #2a3a4a"}} onClick={()=>openView(bus)}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
                  <div style={S.cardBusName}>{bus.bus_name}</div>
                  <div style={{display:"flex",alignItems:"center",fontSize:11,fontWeight:700,color:st==="overdue"?"#e74c3c":st==="due-soon"?"#f5a623":"#2ecc71",background:st==="overdue"?"#e74c3c18":st==="due-soon"?"#f5a62318":"#2ecc7118",padding:"4px 10px",borderRadius:20,whiteSpace:"nowrap"}}>
                    <span className={`status-dot ${st}`}></span>{statusLabel(bus.next_service)}
                  </div>
                </div>
                {bus.location && <div style={S.cardRow}><span style={S.cardIcon}>📍</span>{bus.location.replace("KAH @ ","")}</div>}
                {bus.driver && <div style={S.cardRow}><span style={S.cardIcon}>👤</span>{bus.driver}</div>}
                {bus.last_service && <div style={S.cardRow}><span style={S.cardIcon}>🔧</span>Last serviced: {fmtDate(bus.last_service)}</div>}
                {bus.mileage && <div style={S.cardRow}><span style={S.cardIcon}>📊</span>{parseInt(bus.mileage).toLocaleString()} miles</div>}
                {bus.notes && <div style={{...S.cardRow,marginTop:8,padding:"8px 12px",background:"#0f1923",borderRadius:8,fontSize:12,color:"#8a9ab0",lineHeight:1.5}}>{bus.notes.length>80?bus.notes.slice(0,80)+"…":bus.notes}</div>}
                <NeedsServiceBtn bus={bus} />
              </div>
            );
          })}
        </div>
      )}

      {modal?.mode==="view" && (
        <div style={S.modalOverlay} onClick={()=>setModal(null)}>
          <div style={S.modalBox} onClick={e=>e.stopPropagation()} className="fade-in">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
              <div style={S.modalTitle}>{modal.bus.bus_name}</div>
              <div style={{display:"flex",alignItems:"center",fontSize:12,fontWeight:700,color:serviceStatus(modal.bus.next_service)==="overdue"?"#e74c3c":serviceStatus(modal.bus.next_service)==="due-soon"?"#f5a623":"#2ecc71",background:serviceStatus(modal.bus.next_service)==="overdue"?"#e74c3c18":serviceStatus(modal.bus.next_service)==="due-soon"?"#f5a62318":"#2ecc7118",padding:"6px 14px",borderRadius:20}}>
                <span className={`status-dot ${serviceStatus(modal.bus.next_service)}`}></span>{statusLabel(modal.bus.next_service)}
              </div>
            </div>
            {modal.bus.needs_service && (
              <div style={{background:"rgba(231,76,60,0.12)",border:"1px solid #e74c3c55",borderRadius:10,padding:"10px 16px",marginBottom:16,display:"flex",alignItems:"center",gap:10,color:"#ff6b6b",fontWeight:700,fontSize:13}}>
                <span className="wrench-anim">🔧</span> This vehicle has been flagged as needing service.
              </div>
            )}
            {[
              {icon:"📍",label:"Current Location",val:modal.bus.location||"—"},
              {icon:"👤",label:"Driver Assigned",val:modal.bus.driver||"—"},
              {icon:"🔧",label:"Last Service Date",val:fmtDate(modal.bus.last_service)},
              {icon:"📅",label:"Next Service Due",val:fmtDate(modal.bus.next_service)},
              {icon:"📊",label:"Mileage",val:modal.bus.mileage?parseInt(modal.bus.mileage).toLocaleString()+" miles":"—"},
            ].map(r=>(
              <div key={r.label} style={S.viewRow}><span style={S.viewIcon}>{r.icon}</span><div><div style={S.viewLabel}>{r.label}</div><div style={S.viewValue}>{r.val}</div></div></div>
            ))}
            {modal.bus.notes && (
              <div style={{...S.viewRow,flexDirection:"column",gap:6}}>
                <div style={{display:"flex",gap:12}}><span style={S.viewIcon}>📝</span><div style={S.viewLabel}>NOTES</div></div>
                <div style={{fontSize:14,color:"#c0c8d4",lineHeight:1.7,paddingLeft:32}}>{modal.bus.notes}</div>
              </div>
            )}
            {modal.bus.updated_at && <div style={{fontSize:11,color:"#4a5a6a",marginTop:16,textAlign:"right"}}>Last updated: {new Date(modal.bus.updated_at).toLocaleString()}</div>}
            <div style={S.btnRow}>
              <button style={S.cancelBtn} onClick={()=>setModal(null)}>Close</button>
              <button style={S.editBtn} onClick={()=>openEdit(modal.bus)}>✏️ Edit</button>
              <button style={S.deleteBtn} onClick={()=>setConfirmDelete(modal.bus)}>🗑</button>
            </div>
          </div>
        </div>
      )}

      {(modal?.mode==="add"||modal?.mode==="edit") && (
        <div style={S.modalOverlay} onClick={()=>setModal(null)}>
          <div style={S.modalBox} onClick={e=>e.stopPropagation()} className="fade-in">
            <div style={S.modalTitle}>{modal.mode==="add"?"Add New Vehicle":"Edit Vehicle"}</div>
            <label style={S.label}>Vehicle Name *</label>
            <select style={S.select} value={form.bus_name} onChange={e=>setForm({...form,bus_name:e.target.value})}>
              <option value="">— Select vehicle —</option>
              {BUS_NAMES.map(n=><option key={n}>{n}</option>)}
            </select>
            <label style={S.label}>Current Location</label>
            <select style={S.select} value={form.location} onChange={e=>setForm({...form,location:e.target.value})}>
              <option value="">— Select location —</option>
              {CENTERS.map(c=><option key={c}>{c}</option>)}
            </select>
            <label style={S.label}>Driver Assigned</label>
            <input style={S.input} placeholder="Driver name" value={form.driver} onChange={e=>setForm({...form,driver:e.target.value})} />
            <div style={S.gridHalf}>
              <div><label style={S.label}>Last Service Date</label><input type="date" style={S.input} value={form.last_service} onChange={e=>setForm({...form,last_service:e.target.value})} /></div>
              <div><label style={S.label}>Next Service Due</label><input type="date" style={S.input} value={form.next_service} onChange={e=>setForm({...form,next_service:e.target.value})} /></div>
            </div>
            <label style={S.label}>Current Mileage</label>
            <input style={S.input} type="number" placeholder="e.g. 45000" value={form.mileage} onChange={e=>setForm({...form,mileage:e.target.value})} />
            <label style={S.label}>Service Notes</label>
            <textarea style={S.textarea} rows={4} placeholder="Oil change, brake inspection, tire rotation…" value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})} />
            <div style={S.btnRow}>
              <button style={S.cancelBtn} onClick={()=>setModal(null)}>Cancel</button>
              <button style={{...S.saveBtn,opacity:saving?0.7:1}} onClick={handleSave} disabled={saving}>{saving?"Saving…":"💾 Save Bus"}</button>
            </div>
          </div>
        </div>
      )}

      {confirmDelete && (
        <div style={S.modalOverlay}>
          <div style={{...S.modalBox,maxWidth:360,textAlign:"center"}} className="fade-in">
            <div style={{fontSize:48,marginBottom:16}}>🗑️</div>
            <div style={{...S.modalTitle,fontSize:22}}>Remove {confirmDelete.bus_name}?</div>
            <p style={{color:"#8a9ab0",marginBottom:24,fontSize:14}}>This will permanently delete all info for this vehicle.</p>
            <div style={S.btnRow}>
              <button style={S.cancelBtn} onClick={()=>setConfirmDelete(null)}>Cancel</button>
              <button style={{...S.saveBtn,background:"#e74c3c"}} onClick={()=>handleDelete(confirmDelete.id)}>Delete</button>
            </div>
          </div>
        </div>
      )}

      {toast && <div style={{...S.toast,background:toast.type==="error"?"#c0392b":toast.type==="warning"?"#c0390b":"#27ae60"}}>{toast.type==="error"?"⚠️ ":toast.type==="warning"?"🔧 ":"✅ "}{toast.msg}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
