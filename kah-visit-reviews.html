<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>KAH Center Visit Reviews</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F5F5F0; min-height: 100vh; color: #1a1a1a; }
  input, textarea, button { font-family: inherit; }
  #header { background: #fff; border-bottom: 1px solid #E5E5E0; padding: 14px 20px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 10; }
  #logo { width: 38px; height: 38px; border-radius: 9px; background: #F59E0B; display: flex; align-items: center; justify-content: center; font-weight: 700; color: #fff; font-size: 13px; flex-shrink: 0; }
  #header-text h1 { font-size: 16px; font-weight: 600; }
  #header-text p { font-size: 12px; color: #888; }
  #app { padding: 20px 16px; max-width: 660px; margin: 0 auto; }
  .search-wrap { position: relative; margin-bottom: 10px; }
  .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: #aaa; pointer-events: none; }
  .search-wrap input { width: 100%; padding: 0 12px 0 36px; height: 40px; border-radius: 9px; border: 1px solid #ddd; background: #fff; font-size: 14px; outline: none; color: #1a1a1a; }
  .search-wrap input:focus { border-color: #F59E0B; }
  .count-label { font-size: 12px; color: #999; margin-bottom: 12px; display: block; }
  .card { background: #fff; border-radius: 10px; border: 1px solid #E8E8E3; margin-bottom: 8px; padding: 14px 16px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: border-color 0.15s; }
  .card:hover { border-color: #F59E0B; }
  .avatar { width: 40px; height: 40px; border-radius: 9px; background: #FFFBEB; display: flex; align-items: center; justify-content: center; color: #B45309; font-weight: 700; font-size: 12px; flex-shrink: 0; }
  .card-name { font-size: 15px; font-weight: 500; }
  .card-sub { font-size: 12px; color: #aaa; margin-top: 2px; }
  .badge { background: #FFFBEB; color: #B45309; border-radius: 20px; padding: 2px 10px; font-size: 12px; font-weight: 500; flex-shrink: 0; }
  .chevron { color: #ccc; flex-shrink: 0; }
  .back-btn { background: none; border: none; cursor: pointer; display: flex; align-items: center; gap: 6px; color: #888; font-size: 14px; padding: 4px 0; margin-bottom: 16px; }
  .back-btn:hover { color: #F59E0B; }
  .section-head { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 16px; }
  .section-title { font-size: 20px; font-weight: 600; }
  .section-sub { font-size: 13px; color: #888; margin-top: 2px; }
  .add-btn { display: flex; align-items: center; gap: 6px; background: #F59E0B; color: #fff; border: none; border-radius: 8px; padding: 9px 14px; font-size: 14px; font-weight: 500; cursor: pointer; flex-shrink: 0; }
  .add-btn:hover { background: #D97706; }
  .rev-card { background: #fff; border-radius: 10px; border: 1px solid #E8E8E3; margin-bottom: 8px; padding: 14px 16px; cursor: pointer; display: flex; align-items: flex-start; gap: 12px; transition: border-color 0.15s; }
  .rev-card:hover { border-color: #F59E0B; }
  .rev-icon { width: 36px; height: 36px; border-radius: 8px; background: #FFFBEB; display: flex; align-items: center; justify-content: center; color: #B45309; flex-shrink: 0; }
  .rev-date { font-size: 15px; font-weight: 500; }
  .rev-meta { font-size: 13px; color: #888; margin-top: 2px; }
  .rev-notes-preview { font-size: 13px; color: #999; margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 380px; }
  .empty { text-align: center; padding: 52px 20px; color: #aaa; }
  .empty .emoji { font-size: 44px; margin-bottom: 12px; }
  .empty p { font-size: 15px; }
  .empty small { font-size: 13px; }
  .detail-card { background: #fff; border-radius: 10px; border: 1px solid #E8E8E3; padding: 18px; }
  .detail-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .detail-head h2 { font-size: 18px; font-weight: 600; }
  .detail-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .detail-label { font-size: 13px; color: #888; width: 90px; flex-shrink: 0; }
  .detail-val { font-size: 15px; font-weight: 500; }
  .notes-box { background: #F9F9F6; border-radius: 8px; padding: 12px 14px; font-size: 14px; line-height: 1.65; margin-top: 4px; border: 1px solid #EEEDE8; }
  .notes-label { font-size: 13px; color: #888; margin: 12px 0 6px; }
  .review-img { width: 100%; border-radius: 10px; border: 1px solid #E8E8E3; margin-top: 4px; }
  .pdf-viewer { width: 100%; height: 520px; border-radius: 10px; border: 1px solid #E8E8E3; margin-top: 4px; }
  .open-link { display: inline-flex; align-items: center; gap: 6px; margin-top: 10px; background: #F59E0B; color: #fff; border: none; border-radius: 8px; padding: 8px 14px; font-size: 14px; cursor: pointer; text-decoration: none; }
  .open-link:hover { background: #D97706; }
  .delete-btn { background: none; border: 1px solid #E8E8E3; border-radius: 8px; padding: 6px 12px; font-size: 13px; color: #888; cursor: pointer; display: flex; align-items: center; gap: 5px; }
  .delete-btn:hover { border-color: #EF4444; color: #EF4444; }
  .confirm-box { background: #FEF2F2; border: 1px solid #FECACA; border-radius: 10px; padding: 14px 16px; margin-top: 14px; }
  .confirm-box p { font-size: 14px; color: #991B1B; margin-bottom: 10px; }
  .confirm-btns { display: flex; gap: 8px; }
  .confirm-del { background: #EF4444; color: #fff; border: none; border-radius: 6px; padding: 6px 14px; font-size: 13px; cursor: pointer; }
  .confirm-cancel { background: #fff; border: 1px solid #ddd; border-radius: 6px; padding: 6px 14px; font-size: 13px; cursor: pointer; color: #555; }
  .divider { border: none; border-top: 1px solid #EEEDE8; margin: 14px 0; }
  .no-file { font-size: 13px; color: #bbb; margin-top: 4px; }
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.38); display: flex; align-items: flex-end; justify-content: center; z-index: 100; }
  .modal { background: #fff; border-radius: 16px 16px 0 0; width: 100%; max-width: 620px; padding: 22px 20px 36px; max-height: 92vh; overflow-y: auto; }
  .modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .modal-head h2 { font-size: 16px; font-weight: 600; }
  .close-btn { background: none; border: none; cursor: pointer; color: #aaa; font-size: 22px; line-height: 1; padding: 0; }
  .close-btn:hover { color: #555; }
  .field-group { margin-bottom: 16px; }
  label { display: block; font-size: 13px; font-weight: 500; color: #666; margin-bottom: 6px; }
  input[type="date"], input[type="text"] { width: 100%; height: 42px; border-radius: 8px; border: 1px solid #ddd; padding: 0 12px; font-size: 15px; color: #1a1a1a; outline: none; background: #fff; }
  input[type="date"]:focus, input[type="text"]:focus { border-color: #F59E0B; }
  textarea { width: 100%; border-radius: 8px; border: 1px solid #ddd; padding: 10px 12px; font-size: 15px; color: #1a1a1a; outline: none; resize: vertical; min-height: 90px; background: #fff; }
  textarea:focus { border-color: #F59E0B; }
  .upload-area { width: 100%; border: 2px dashed #F59E0B; border-radius: 8px; padding: 24px; text-align: center; cursor: pointer; color: #B45309; font-size: 14px; background: #FFFBEB; display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .upload-area:hover { background: #FEF3C7; }
  .upload-area svg { width: 28px; height: 28px; }
  .file-preview { background: #F9F9F6; border: 1px solid #ddd; border-radius: 8px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; position: relative; }
  .file-preview-name { font-size: 14px; color: #444; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-preview-remove { background: rgba(0,0,0,0.12); border: none; border-radius: 50%; width: 26px; height: 26px; cursor: pointer; color: #555; font-size: 16px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .img-preview { width: 100%; border-radius: 8px; border: 1px solid #ddd; display: block; margin-top: 8px; }
  .save-btn { width: 100%; background: #F59E0B; color: #fff; border: none; border-radius: 9px; height: 46px; font-size: 16px; font-weight: 500; cursor: pointer; margin-top: 8px; }
  .save-btn:hover { background: #D97706; }
  .save-btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .progress-bar-wrap { width: 100%; background: #F0EDE8; border-radius: 8px; height: 8px; margin-top: 10px; overflow: hidden; }
  .progress-bar { height: 100%; background: #F59E0B; border-radius: 8px; transition: width 0.3s; }
  .progress-label { font-size: 13px; color: #888; text-align: center; margin-top: 6px; }
  .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid #E8E8E3; border-top-color: #F59E0B; border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-wrap { text-align: center; padding: 48px; color: #bbb; display: flex; flex-direction: column; align-items: center; gap: 12px; font-size: 14px; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1a1a1a; color: #fff; padding: 10px 20px; border-radius: 8px; font-size: 14px; z-index: 200; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div id="header">
  <div id="logo">KAH</div>
  <div id="header-text">
    <h1>Center Visit Reviews</h1>
    <p>Kids After Hours — Admin Tool</p>
  </div>
</div>

<div id="app">
  <div class="loading-wrap"><div class="spinner"></div>Connecting…</div>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="file-input" accept="image/*,.pdf" style="display:none" />

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const { createClient } = supabase;
const sb = createClient(
  'https://tjvzvwbtmilknguywdse.supabase.co',
  'sb_publishable_6gAsF5-FGs3SiEx-V2WL6Q_nenqNO5q'
);

const CENTERS = [
  { id: "barnsley", name: "Barnsley Elementary" },
  { id: "bayard-rustin", name: "Bayard Rustin Elementary" },
  { id: "burtonsville", name: "Burtonsville Elementary" },
  { id: "cannon-road", name: "Cannon Road Elementary" },
  { id: "carderock-springs", name: "Carderock Springs Elementary" },
  { id: "cloverly", name: "Cloverly Elementary" },
  { id: "fairland", name: "Fairland Elementary" },
  { id: "farmland", name: "Farmland Elementary" },
  { id: "flora-singer", name: "Flora Singer Elementary" },
  { id: "flower-valley", name: "Flower Valley Elementary" },
  { id: "forest-knolls", name: "Forest Knolls Elementary" },
  { id: "freedom", name: "Freedom Elementary" },
  { id: "garrett-park", name: "Garrett Park Elementary" },
  { id: "glenallan", name: "Glenallan Elementary" },
  { id: "glen-haven", name: "Glen Haven Elementary" },
  { id: "greencastle", name: "Greencastle Elementary" },
  { id: "highland-view", name: "Highland View Elementary" },
  { id: "meadow-hall", name: "Meadow Hall Elementary" },
  { id: "north-chevy-chase", name: "North Chevy Chase Elementary" },
  { id: "oakland-terrace", name: "Oakland Terrace Elementary" },
  { id: "page", name: "Page Elementary" },
  { id: "red-barn-ranch", name: "Red Barn Ranch" },
  { id: "rock-view", name: "Rock View Elementary" },
  { id: "rosemary-hills", name: "Rosemary Hills Elementary" },
  { id: "sargent-shriver", name: "Sargent Shriver Elementary" },
  { id: "taneytown", name: "Taneytown Elementary" },
  { id: "westbrook", name: "Westbrook Elementary" },
  { id: "westover", name: "Westover Elementary" },
  { id: "woodlin", name: "Woodlin Elementary" },
];

let state = {
  view: "list",
  selectedCenter: null,
  reviews: [],
  reviewsLoading: false,
  activeReview: null,
  centerCounts: {},
  centerLastVisit: {},
  search: "",
  showModal: false,
  formDate: todayStr(),
  formReviewer: "",
  formNotes: "",
  formFile: null,
  formFileName: "",
  formFileType: null,
  formPreviewUrl: null,
  saving: false,
  uploadProgress: 0,
  deleteConfirm: false,
};

function todayStr() { return new Date().toISOString().slice(0, 10); }
function formatDate(s) {
  if (!s) return "";
  const d = new Date(s + "T00:00:00");
  return d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
}
function initials(name) { return name.split(" ").slice(0, 2).map(w => w[0]).join("").toUpperCase(); }
function escHtml(str) {
  if (!str) return "";
  return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 3000);
}

// ── Supabase ───────────────────────────────────────────────────────────
async function fetchCenterMeta() {
  const { data, error } = await sb.from("visit_reviews").select("center_id, date").order("date", { ascending: false });
  if (error) { console.error(error); return; }
  const counts = {}, lastVisit = {};
  CENTERS.forEach(c => { counts[c.id] = 0; lastVisit[c.id] = null; });
  (data || []).forEach(r => {
    counts[r.center_id] = (counts[r.center_id] || 0) + 1;
    if (!lastVisit[r.center_id]) lastVisit[r.center_id] = r.date;
  });
  state.centerCounts = counts;
  state.centerLastVisit = lastVisit;
}

async function fetchReviewsForCenter(centerId) {
  const { data, error } = await sb.from("visit_reviews").select("*").eq("center_id", centerId).order("date", { ascending: false });
  if (error) { console.error(error); return []; }
  return (data || []).map(r => ({
    id: r.id, centerId: r.center_id, date: r.date,
    reviewer: r.reviewer, notes: r.notes || "",
    hasFile: r.has_image, fileType: r.file_type,
    fileUrl: r.file_url, createdAt: r.created_at,
  }));
}

async function uploadFile(reviewId, file) {
  const ext = file.type === "application/pdf" ? "pdf" : "jpg";
  const path = `${reviewId}.${ext}`;
  const { error } = await sb.storage.from("review-files").upload(path, file, { contentType: file.type, upsert: true });
  if (error) throw error;
  const { data } = sb.storage.from("review-files").getPublicUrl(path);
  return data.publicUrl;
}

async function insertReview(review, fileUrl) {
  const { error } = await sb.from("visit_reviews").insert({
    id: review.id, center_id: review.centerId, date: review.date,
    reviewer: review.reviewer, notes: review.notes || null,
    has_image: review.hasFile, file_type: review.fileType,
    file_url: fileUrl || null, created_at: review.createdAt,
  });
  if (error) throw error;
}

async function removeReview(reviewId, fileType) {
  if (fileType) {
    const ext = fileType === "pdf" ? "pdf" : "jpg";
    await sb.storage.from("review-files").remove([`${reviewId}.${ext}`]);
  }
  const { error } = await sb.from("visit_reviews").delete().eq("id", reviewId);
  if (error) throw error;
}

// ── Render ─────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById("app");
  if (state.view === "list") app.innerHTML = renderList();
  else if (state.view === "center") app.innerHTML = renderCenter();
  else if (state.view === "review") app.innerHTML = renderReview();
  if (state.showModal) { app.innerHTML += renderModal(); bindModal(); }
  bindEvents();
}

function renderList() {
  const filtered = CENTERS.filter(c => c.name.toLowerCase().includes(state.search.toLowerCase()));
  const items = filtered.map(c => {
    const count = state.centerCounts[c.id] || 0;
    const last = state.centerLastVisit[c.id];
    return `<div class="card" data-action="open-center" data-id="${c.id}">
      <div class="avatar">${initials(c.name)}</div>
      <div style="flex:1;min-width:0">
        <div class="card-name">${c.name}</div>
        <div class="card-sub">${last ? "Last visit: " + formatDate(last) : "No visits yet"}</div>
      </div>
      <span class="badge">${count} visit${count !== 1 ? "s" : ""}</span>
      <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
    </div>`;
  }).join("");
  return `
    <div class="search-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="search-input" type="text" placeholder="Search centers…" value="${escHtml(state.search)}" />
    </div>
    <span class="count-label">${filtered.length} center${filtered.length !== 1 ? "s" : ""}</span>
    ${items || '<div class="empty"><p>No centers found.</p></div>'}`;
}

function renderCenter() {
  const c = state.selectedCenter;
  let revHtml = "";
  if (state.reviewsLoading) {
    revHtml = `<div class="loading-wrap"><div class="spinner"></div>Loading reviews…</div>`;
  } else if (state.reviews.length === 0) {
    revHtml = `<div class="empty"><div class="emoji">📋</div><p>No visit reviews yet.</p><small>Tap "Add Review" after a center visit.</small></div>`;
  } else {
    revHtml = state.reviews.map(r => {
      const icon = r.fileType === "pdf" ? "📄" : r.hasFile ? "📷" : "";
      return `<div class="rev-card" data-action="open-review" data-id="${r.id}">
        <div class="rev-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        </div>
        <div style="flex:1;min-width:0">
          <div class="rev-date">${formatDate(r.date)}</div>
          <div class="rev-meta">Reviewed by ${escHtml(r.reviewer)}${icon ? " &nbsp;" + icon : ""}</div>
          ${r.notes ? `<div class="rev-notes-preview">${escHtml(r.notes)}</div>` : ""}
        </div>
        <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      </div>`;
    }).join("");
  }
  return `
    <button class="back-btn" data-action="go-list">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      All Centers
    </button>
    <div class="section-head">
      <div>
        <div class="section-title">${escHtml(c.name)}</div>
        <div class="section-sub">${state.reviews.length} visit review${state.reviews.length !== 1 ? "s" : ""}</div>
      </div>
      <button class="add-btn" data-action="open-modal">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add Review
      </button>
    </div>
    ${revHtml}`;
}

function renderReview() {
  const r = state.activeReview;
  let fileHtml = "";
  if (r.hasFile && r.fileUrl) {
    if (r.fileType === "pdf") {
      fileHtml = `
        <embed src="${escHtml(r.fileUrl)}" type="application/pdf" class="pdf-viewer" />
        <a class="open-link" href="${escHtml(r.fileUrl)}" target="_blank">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          Open PDF
        </a>`;
    } else {
      fileHtml = `<img class="review-img" src="${escHtml(r.fileUrl)}" alt="Visit review form" />`;
    }
  } else if (r.hasFile) {
    fileHtml = `<div style="font-size:13px;color:#bbb;margin-top:4px">File unavailable</div>`;
  }

  const confirmHtml = state.deleteConfirm ? `
    <div class="confirm-box">
      <p>Delete this visit review? This cannot be undone.</p>
      <div class="confirm-btns">
        <button class="confirm-del" data-action="confirm-delete">Delete</button>
        <button class="confirm-cancel" data-action="cancel-delete">Cancel</button>
      </div>
    </div>` : "";

  return `
    <button class="back-btn" data-action="go-center">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      ${escHtml(state.selectedCenter.name)}
    </button>
    <div class="detail-card">
      <div class="detail-head">
        <h2>Visit Review</h2>
        <button class="delete-btn" data-action="start-delete">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          Delete
        </button>
      </div>
      <div class="detail-row"><span class="detail-label">Date</span><span class="detail-val">${formatDate(r.date)}</span></div>
      <div class="detail-row"><span class="detail-label">Reviewer</span><span class="detail-val">${escHtml(r.reviewer)}</span></div>
      ${r.notes ? `<div class="notes-label">Notes</div><div class="notes-box">${escHtml(r.notes)}</div>` : ""}
      ${confirmHtml}
      <hr class="divider">
      <div class="notes-label">Uploaded Review Form</div>
      ${r.hasFile ? fileHtml : `<div class="no-file">No file uploaded for this review.</div>`}
    </div>`;
}

function renderModal() {
  const c = state.selectedCenter;
  let uploadHtml = "";
  if (state.formFile) {
    const isImg = state.formFileType !== "pdf";
    uploadHtml = `
      <div class="file-preview">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#B45309" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        <span class="file-preview-name">${escHtml(state.formFileName)}</span>
        <button class="file-preview-remove" data-action="remove-file">&#x2715;</button>
      </div>
      ${isImg && state.formPreviewUrl ? `<img class="img-preview" src="${state.formPreviewUrl}" alt="Preview" />` : ""}`;
  } else {
    uploadHtml = `
      <div class="upload-area" data-action="trigger-upload">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <span>Tap to upload photo or PDF of review form</span>
        <span style="font-size:12px;color:#aaa">Supports JPG, PNG, PDF</span>
      </div>`;
  }

  const canSave = state.formDate && state.formReviewer.trim();
  const progressHtml = state.saving && state.uploadProgress > 0 ? `
    <div class="progress-bar-wrap"><div class="progress-bar" style="width:${state.uploadProgress}%"></div></div>
    <div class="progress-label">${state.uploadProgress < 100 ? "Uploading… " + state.uploadProgress + "%" : "Saving…"}</div>` : "";

  return `
    <div class="overlay" id="modal-overlay">
      <div class="modal">
        <div class="modal-head">
          <h2>Add Visit Review — ${escHtml(c.name)}</h2>
          <button class="close-btn" data-action="close-modal">&#x2715;</button>
        </div>
        <div class="field-group"><label>Visit Date *</label><input type="date" id="f-date" value="${state.formDate}" /></div>
        <div class="field-group"><label>Reviewer Name *</label><input type="text" id="f-reviewer" placeholder="Your name" value="${escHtml(state.formReviewer)}" /></div>
        <div class="field-group"><label>Notes (optional)</label><textarea id="f-notes" placeholder="Any additional notes or observations…">${escHtml(state.formNotes)}</textarea></div>
        <div class="field-group"><label>Upload Review Form (optional)</label>${uploadHtml}</div>
        ${progressHtml}
        <button class="save-btn" data-action="save-review" ${!canSave || state.saving ? "disabled" : ""}>${state.saving ? "Saving…" : "Save Review"}</button>
      </div>
    </div>`;
}

// ── Events ─────────────────────────────────────────────────────────────
function bindEvents() {
  const si = document.getElementById("search-input");
  if (si) si.addEventListener("input", e => { state.search = e.target.value; render(); });
  document.getElementById("app").addEventListener("click", handleClick);
}
function bindModal() {
  const overlay = document.getElementById("modal-overlay");
  if (overlay) overlay.addEventListener("click", e => { if (e.target === overlay) closeModal(); });
  const fd = document.getElementById("f-date");
  const fr = document.getElementById("f-reviewer");
  const fn = document.getElementById("f-notes");
  if (fd) fd.addEventListener("change", e => { state.formDate = e.target.value; });
  if (fr) fr.addEventListener("input", e => { state.formReviewer = e.target.value; });
  if (fn) fn.addEventListener("input", e => { state.formNotes = e.target.value; });
}
function handleClick(e) {
  const el = e.target.closest("[data-action]");
  if (!el) return;
  const action = el.dataset.action;
  if (action === "open-center") { const c = CENTERS.find(c => c.id === el.dataset.id); if (c) openCenter(c); }
  else if (action === "go-list") { state.view = "list"; state.selectedCenter = null; state.reviews = []; render(); }
  else if (action === "go-center") { state.view = "center"; state.activeReview = null; state.deleteConfirm = false; render(); }
  else if (action === "open-review") { const r = state.reviews.find(r => r.id === el.dataset.id); if (r) openReview(r); }
  else if (action === "open-modal") { state.showModal = true; render(); }
  else if (action === "close-modal") { closeModal(); }
  else if (action === "trigger-upload") { document.getElementById("file-input").click(); }
  else if (action === "remove-file") { state.formFile = null; state.formFileName = ""; state.formFileType = null; state.formPreviewUrl = null; render(); }
  else if (action === "save-review") { saveReview(); }
  else if (action === "start-delete") { state.deleteConfirm = true; render(); }
  else if (action === "confirm-delete") { doDelete(); }
  else if (action === "cancel-delete") { state.deleteConfirm = false; render(); }
}

function closeModal() {
  state.showModal = false; state.formDate = todayStr();
  state.formReviewer = ""; state.formNotes = "";
  state.formFile = null; state.formFileName = ""; state.formFileType = null; state.formPreviewUrl = null;
  state.saving = false; state.uploadProgress = 0;
  render();
}

async function openCenter(center) {
  state.selectedCenter = center; state.view = "center";
  state.reviewsLoading = true; state.reviews = [];
  render();
  state.reviews = await fetchReviewsForCenter(center.id);
  state.reviewsLoading = false;
  render();
}

function openReview(rev) {
  state.activeReview = rev; state.deleteConfirm = false;
  state.view = "review";
  render();
}

async function saveReview() {
  const fd = document.getElementById("f-date");
  const fr = document.getElementById("f-reviewer");
  const fn = document.getElementById("f-notes");
  if (fd) state.formDate = fd.value;
  if (fr) state.formReviewer = fr.value;
  if (fn) state.formNotes = fn.value;
  if (!state.formDate || !state.formReviewer.trim()) return;

  state.saving = true; state.uploadProgress = 0; render();

  const reviewId = state.selectedCenter.id + "-" + Date.now();
  const review = {
    id: reviewId, centerId: state.selectedCenter.id,
    date: state.formDate, reviewer: state.formReviewer.trim(),
    notes: state.formNotes.trim(), hasFile: !!state.formFile,
    fileType: state.formFileType, createdAt: new Date().toISOString(),
  };

  try {
    let fileUrl = null;
    if (state.formFile) {
      state.uploadProgress = 30; render();
      fileUrl = await uploadFile(reviewId, state.formFile);
      state.uploadProgress = 80; render();
    }
    await insertReview(review, fileUrl);
    state.uploadProgress = 100;
    review.fileUrl = fileUrl;
    state.centerCounts[state.selectedCenter.id] = (state.centerCounts[state.selectedCenter.id] || 0) + 1;
    if (!state.centerLastVisit[state.selectedCenter.id] || review.date >= state.centerLastVisit[state.selectedCenter.id]) {
      state.centerLastVisit[state.selectedCenter.id] = review.date;
    }
    state.reviews = [review, ...state.reviews];
    state.saving = false;
    closeModal();
    showToast("Review saved!");
  } catch (err) {
    state.saving = false; state.uploadProgress = 0; render();
    showToast("Error saving — " + (err.message || "check console"));
    console.error(err);
  }
}

async function doDelete() {
  const r = state.activeReview;
  try {
    await removeReview(r.id, r.fileType);
    state.centerCounts[state.selectedCenter.id] = Math.max(0, (state.centerCounts[state.selectedCenter.id] || 1) - 1);
    state.reviews = state.reviews.filter(x => x.id !== r.id);
    state.centerLastVisit[state.selectedCenter.id] = state.reviews.length > 0 ? state.reviews[0].date : null;
    state.view = "center"; state.activeReview = null; state.deleteConfirm = false;
    render(); showToast("Review deleted.");
  } catch (err) {
    showToast("Error deleting — " + (err.message || "check console"));
    console.error(err);
  }
}

// ── File input ─────────────────────────────────────────────────────────
document.getElementById("file-input").addEventListener("change", function(e) {
  const file = e.target.files[0];
  if (!file) return;
  state.formFile = file;
  state.formFileName = file.name;
  state.formFileType = file.type === "application/pdf" ? "pdf" : "image";
  if (state.formFileType === "image") {
    const reader = new FileReader();
    reader.onload = ev => { state.formPreviewUrl = ev.target.result; render(); };
    reader.readAsDataURL(file);
  } else {
    state.formPreviewUrl = null;
    render();
  }
  this.value = "";
});

// ── Init ───────────────────────────────────────────────────────────────
(async () => { await fetchCenterMeta(); render(); })();
</script>
</body>
</html>
